name: bun-expressjs-typescript

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
#    ports:
#      - target: 5432
#        published: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - expressjs_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - target: 3000
        published: 3000
    networks:
      - expressjs_network
    restart: always
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  rabbitmq:
    build:
      context: ..
      dockerfile: docker/Dockerfile-rabbitmq
    hostname: rabbitmq
    ports:
#      - "5672:5672"   # AMQP
      - "15673:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - expressjs_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis/redis-stack
    restart: always
    environment:
      - REDIS_ARGS=--save 1200 32
    volumes:
      - redis_data:/data
    networks:
      - expressjs_network
    ports:
#      - target: 6379
#        published: 6379
      - target: 8001
        published: 8002
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9009:9009"
    volumes:
      - minio-data:/data
    restart: always
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS}
      MINIO_ROOT_PASSWORD: ${S3_SECRET}
    command: server --console-address ":9009" /data
    networks:
      - expressjs_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  minio-init:
      image: minio/mc
      depends_on:
        minio:
          condition: service_healthy
      networks:
        - expressjs_network
      environment:
        MINIO_ROOT_USER: ${S3_ACCESS}
        MINIO_ROOT_PASSWORD: ${S3_SECRET}
      entrypoint: >
        /bin/sh -c "
        mc alias set local http://minio:9000 $$S3_ACCESS $$S3_SECRET;
        mc mb local/expressjs-bucket --ignore-existing;
        mc anonymous set public local/expressjs-bucket;
        exit 0;
        "

volumes:
  postgres_data:
  rabbitmq_data:
  rabbitmq_logs:
  redis_data:
  minio-data:

networks:
  expressjs_network:
    driver: bridge
